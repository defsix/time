name: Build Android APK

on:
  push:
    branches: [main]
    # Version tags (e.g. v1.0) trigger the signed release APK publish step
    # below, regardless of what files a given tagged commit touches — GitHub
    # applies `paths` to tag pushes too when both are present in the same
    # trigger, so this only reliably fires because the documented release
    # process (bump versionCode/versionName in app/build.gradle.kts, commit,
    # then tag) always touches a path this filter already matches.
    tags: ['v*']
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: world-time-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Gives a stable URL that always points at the newest build from main,
      # instead of a per-run artifact link that expires after ~90 days.
      - name: Publish to the rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-debug-latest
          name: Android (latest debug build)
          body: |
            Automatically rebuilt and replaced on every push to `main`
            (currently commit ${{ github.sha }}). This is a **debug build,
            not signed for distribution** — install directly, e.g.
            `adb install -r app-debug.apk`.
          prerelease: true
          make_latest: false
          files: android/app/build/outputs/apk/debug/app-debug.apk

      # World Time is distributed only via GitHub Releases (no Play Store),
      # so this builds a signed .apk, not a .aab. The four secrets below are
      # optional for ordinary branch/PR builds: without them, the release
      # build type falls back to debug signing (see app/build.gradle.kts),
      # so this still builds to smoke-test the R8-minified shape. A tagged
      # release is different — publishing a debug-signed APK as "the"
      # signed release would be silently wrong, so that case fails the job
      # instead (see the guard below).
      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release.jks
            export ANDROID_KEYSTORE_PATH="release.jks"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set — refusing to publish a debug-signed APK as the signed release for $GITHUB_REF. Add the ANDROID_KEYSTORE_* repo secrets first (see android/README.md)." >&2
            exit 1
          fi
          ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: world-time-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # Only for tagged releases (see the `tags` trigger above) — the debug
      # APK above is already covered by the rolling "latest" release, this
      # is the signed build people actually install.
      - name: Compute release APK checksum
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android/app/build/outputs/apk/release
        run: sha256sum app-release.apk > app-release.apk.sha256

      - name: Publish signed release APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Signed release build (not the debug build above) — this is the
            one to install. Sideload it directly, e.g.
            `adb install app-release.apk`, and optionally verify it wasn't
            corrupted/tampered with first:

            ```
            sha256sum -c app-release.apk.sha256
            ```
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/release/app-release.apk.sha256
