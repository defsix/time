name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: world-time-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Gives a stable URL that always points at the newest build from main,
      # instead of a per-run artifact link that expires after ~90 days.
      - name: Publish to the rolling "latest" release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-debug-latest
          name: Android (latest debug build)
          body: |
            Automatically rebuilt and replaced on every push to `main`
            (currently commit ${{ github.sha }}). This is a **debug build,
            not signed for distribution** — install directly, e.g.
            `adb install -r app-debug.apk`.
          prerelease: true
          make_latest: false
          files: android/app/build/outputs/apk/debug/app-debug.apk

      # Play Store submissions need a signed .aab, not a debug .apk. This
      # secret is optional: without it, the release build type falls back to
      # debug signing (see app/build.gradle.kts), so the bundle still builds
      # to smoke-test the R8-minified shape but isn't upload-able to Play —
      # set the four ANDROID_* secrets below (see android/README.md) once a
      # real release keystore exists.
      - name: Decode release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        # build.gradle.kts resolves a relative ANDROID_KEYSTORE_PATH against
        # the app module's project dir (android/app), not android/ itself.
        working-directory: android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.jks

      - name: Build release AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'release.jks' || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: world-time-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
