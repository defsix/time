name: WorldTime
options:
  bundleIdPrefix: io.defsix
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  WorldTime:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WorldTime/App
      - path: WorldTime/WebView
      - path: WorldTime/Resources/Assets.xcassets
      - path: WorldTime/Resources/www
        type: folder
        buildPhase: resources
    info:
      path: WorldTime/Supporting/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.defsix.time
        PRODUCT_NAME: WorldTime
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
    preBuildScripts:
      - name: Sync Web Assets
        script: |
          "$SRCROOT/Scripts/sync-web-assets.sh"
        basedOnDependencyAnalysis: false
